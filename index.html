<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShieldNav</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo { font-size: 2.5rem; font-weight: 800; color: #0B75C2; margin-bottom: 8px; letter-spacing: -0.5px; }
    .sub { color: #5a5a5a; font-size: 1rem; margin-bottom: 48px; text-align: center; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 560px; width: 100%; }
    a.card {
      display: block;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    a.card.primary { background: #0B75C2; border-color: #0B75C2; }
    a.card.primary h2 { color: #fff; }
    a.card.primary p { color: rgba(255,255,255,0.85); }
    a.card.primary:hover { background: #0966ab; border-color: #0966ab; }
    a.card:not(.primary):hover { border-color: #0B75C2; box-shadow: 0 4px 16px rgba(11,117,194,0.1); }
    a.card .icon { font-size: 1.8rem; margin-bottom: 12px; }
    a.card h2 { font-size: 1.05rem; font-weight: 700; color: #0B75C2; margin-bottom: 4px; }
    a.card p { font-size: 0.875rem; color: #5a5a5a; line-height: 1.45; }
    footer { margin-top: 48px; color: #999; font-size: 0.8rem; text-align: center; }
    @media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="logo">🛡️ ShieldNav</div>
  <p class="sub">Drive smarter. Stay safer.</p>
  <div class="cards">
    <a class="card primary" href="/waitlist">
      <div class="icon">🚀</div>
      <h2>Join the Waitlist</h2>
      <p>Be the first to know when ShieldNav is ready to purchase.</p>
    </a>
    <a class="card" href="/legal">
      <div class="icon">📋</div>
      <h2>Legal &amp; Privacy</h2>
      <p>Privacy policy, terms of use, and legal documents.</p>
    </a>
  </div>
  <footer>&copy; 2026 ShieldNav, LLC &nbsp;·&nbsp; <a href="mailto:support@shieldnav.com" style="color:#0B75C2;">support@shieldnav.com</a></footer>
</body>
</html>
