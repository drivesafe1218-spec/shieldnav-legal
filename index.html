<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShieldNav – Navigate Safer</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/brand.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .hero-logo {
      max-width: 240px;
      max-height: 80px;
      width: auto;
      height: auto;
      margin-bottom: 16px;
    }
    .hero-tagline {
      font-family: 'Sora', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-2);
      margin-bottom: 44px;
      text-align: center;
      letter-spacing: -0.2px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 560px;
      width: 100%;
    }
    .landing-footer {
      margin-top: 48px;
      font-size: 0.82rem;
      color: var(--text-3);
      text-align: center;
    }
    .landing-footer a { color: var(--blue); text-decoration: none; }
    .landing-footer a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: 1fr; }
      .hero-logo { max-height: 60px; }
    }
  </style>
</head>
<body>

  <img src="/assets/images/shieldnav_logo.png" alt="ShieldNav" class="hero-logo" />
  <p class="hero-tagline">Navigate Safer</p>

  <div class="cards-grid">
    <a class="hub-card primary" href="/waitlist">
      <div class="card-icon">🚀</div>
      <h2>Join the Waitlist</h2>
      <p>Be the first to know when ShieldNav is ready to purchase.</p>
    </a>
    <a class="hub-card" href="/legal">
      <div class="card-icon">📋</div>
      <h2>Legal &amp; Privacy</h2>
      <p>Privacy policy, terms of use, and legal documents.</p>
    </a>
  </div>

  <div class="landing-footer">
    <p>&copy; 2026 ShieldNav, LLC &nbsp;&middot;&nbsp; <a href="mailto:support@shieldnav.com">support@shieldnav.com</a></p>
  </div>

</body>
</html>
