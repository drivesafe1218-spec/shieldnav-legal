<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShieldNav – Page Not Found</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/brand.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .not-found-logo {
      max-width: 180px;
      max-height: 60px;
      width: auto;
      height: auto;
      margin-bottom: 32px;
    }
    .not-found-code {
      font-family: 'Sora', sans-serif;
      font-size: 4rem;
      font-weight: 800;
      color: var(--blue);
      line-height: 1;
      margin-bottom: 12px;
    }
    .not-found-msg {
      color: var(--text-2);
      font-size: 1rem;
      margin-bottom: 28px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      height: 48px;
      padding: 0 24px;
      background: var(--blue);
      color: #fff;
      border-radius: var(--r-btn);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-home:hover { background: var(--blue-hover); text-decoration: none; color: #fff; }
  </style>
</head>
<body>
  <img src="/assets/images/shieldnav_logo.png" alt="ShieldNav" class="not-found-logo" />
  <div class="not-found-code">404</div>
  <p class="not-found-msg">Page not found.</p>
  <a href="/" class="btn-home">← Back to Home</a>
</body>
</html>
